<!doctype html>
<html lang="en">
    <head>
        @@include("./partials/title-meta.html", {"title": "Login with Pin"}) @@include('./partials/head-css.html')
    </head>

    <body>
        <div class="position-absolute top-0 end-0">
            <img src="assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
        </div>
        <div class="position-absolute bottom-0 start-0" style="transform: rotate(180deg);">
            <img src="assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
        </div>
        <div class="auth-box d-flex align-items-center">
            <div class="container-xxl">
                <div class="row align-items-center justify-content-center">
                    <div class="col-xl-10">
                        <div class="card">
                            <div class="row justify-content-between g-0">
                                <div class="col-lg-6">
                                    <div class="card-body">
                                       <div class="auth-brand text-center mb-4 position-relative">
                                            <a href="index.html" class="logo-dark">
                                                <img src="assets/images/logo-black.png" alt="dark logo" />
                                            </a>
                                            <a href="index.html" class="logo-light">
                                                <img src="assets/images/logo.png" alt="logo" />
                                            </a>
                                            <h4 class="fw-bold mt-4">Welcome to Admin</h4>
                                            <p class="text-muted w-lg-75 mx-auto">This screen is locked. Enter your PIN to continue.</p>
                                        </div>

                                        <div class="text-center mb-4">
                                            <img src="assets/images/users/user-1.jpg" class="rounded-circle img-thumbnail avatar-xxl mb-2" alt="thumbnail" />
                                            <h5 class="fs-md">__username__</h5>
                                        </div>

                                        <form>
                                            <label class="form-label">
                                                Enter your 6-digit code
                                                <span class="text-danger">*</span>
                                            </label>
                                            <div class="d-flex gap-2 mb-3 two-factor">
                                                <input type="text" class="form-control text-center" required />
                                                <input type="text" class="form-control text-center" required />
                                                <input type="text" class="form-control text-center" required />
                                                <input type="text" class="form-control text-center" required />
                                                <input type="text" class="form-control text-center" required />
                                                <input type="text" class="form-control text-center" required />
                                            </div>

                                            <div class="d-grid">
                                                <button type="submit" class="btn btn-primary fw-semibold py-2">Confirm</button>
                                            </div>
                                        </form>

                                        <p class="text-muted text-center mt-4 mb-0">
                                            Not you? Return to
                                            <a href="auth-card-sign-in.html" class="text-decoration-underline link-offset-3 fw-semibold">Sign in</a>
                                        </p>

                                        <p class="text-center text-muted mt-4 mb-0">
                                            ©
                                            <script>
                                                document.write(new Date().getFullYear())
                                            </script>
                                            __name__ — by
                                            <span class="fw-bold">__author__</span>
                                        </p>
                                    </div>
                                </div>

                                <div class="col-lg-6 d-none d-lg-block">
                                    <div class="h-100 position-relative card-side-img rounded-end overflow-hidden" style="background-image: url(assets/images/auth.jpg)">
                                        <div class="p-4 card-img-overlay rounded-end auth-overlay d-flex align-items-end justify-content-center"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- end auth-fluid-->

        @@include('./partials/footer-scripts.html')

        <!-- Two Factor Validator Js -->
        <script src="assets/js/pages/auth-two-factor.js"></script>
    </body>
</html>
