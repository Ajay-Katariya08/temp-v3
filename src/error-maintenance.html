<!doctype html>
<html lang="en">
    <head>
        @@include("./partials/title-meta.html", {"title": "Maintenance"}) @@include('./partials/head-css.html')
    </head>

    <body>
        <div class="position-absolute top-0 end-0">
            <img src="assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
        </div>
        <div class="position-absolute bottom-0 start-0" style="transform: rotate(180deg)">
            <img src="assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
        </div>
        <div class="auth-box d-flex align-items-center">
            <div class="container-xxl">
                <div class="row align-items-center justify-content-center">
                    <div class="col-xl-6">
                        <div class="card mb-0">
                            <div class="card-body">
                                <div class="auth-brand text-center mb-0">
                                    <a href="index.html" class="logo-dark">
                                        <img src="assets/images/logo-black.png" alt="dark logo" height="32" />
                                    </a>
                                    <a href="index.html" class="logo-light">
                                        <img src="assets/images/logo.png" alt="logo" height="32" />
                                    </a>
                                </div>

                                <div class="p-2 text-center">
                                    <div class="w-md-50 mx-auto">
                                        <img src="assets/images/maintenance.svg" alt="Maintenance" class="img-fluid" />
                                    </div>

                                    <h3 class="fw-bold text-uppercase">We’ll Be Back Soon</h3>
                                    <p class="text-muted">
                                        Our site is undergoing routine maintenance to improve your experience.
                                        <br />
                                        Thank you for your patience.
                                    </p>

                                    <button class="btn btn-primary mt-3 me-1">Call Support</button>
                                    <button class="btn btn-info mt-3">Send Email</button>
                                </div>

                                <p class="text-center text-muted mt-5 mb-0">
                                    ©
                                    <script>
                                        document.write(new Date().getFullYear())
                                    </script>
                                    __name__ — by
                                    <span class="fw-semibold">__author__</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- end auth-fluid-->
        @@include('./partials/footer-scripts.html')
    </body>
</html>
