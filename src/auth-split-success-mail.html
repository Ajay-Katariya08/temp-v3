<!doctype html>
<html lang="en">
    <head>
        @@include("./partials/title-meta.html", {"title": "Success Mail"}) @@include('./partials/head-css.html')
    </head>

    <body>
        <div class="auth-box p-0 w-100">
            <div class="row w-100 g-0">
                <div class="col-md-auto">
                    <!--Auth Box content -->
                    <div class="card auth-box-form border-0 mb-0">
                        <div class="position-absolute top-0 end-0" style="width: 180px">
                            <img src="assets/images/auth-card-bg.svg" class="auth-card-bg-img" alt="auth-card-bg" />
                        </div>
                        <div class="card-body min-vh-100 position-relative d-flex flex-column justify-content-center">
                            <div class="auth-brand mb-0 text-center">
                                <a href="index.html" class="logo-dark">
                                    <img src="assets/images/logo-black.png" alt="dark logo" />
                                </a>
                                <a href="index.html" class="logo-light">
                                    <img src="assets/images/logo.png" alt="logo" />
                                </a>
                            </div>

                            <div class="mt-auto">
                                <form class="mt-4">
                                    <div class="mb-4">
                                        <div class="avatar-xxl mx-auto mt-2">
                                            <div class="avatar-title bg-light-subtle border border-light border-dashed rounded-circle">
                                                <img src="assets/images/checkmark.png" alt="checkmark" height="64" />
                                            </div>
                                        </div>
                                    </div>

                                    <h4 class="fw-bold text-center mb-4">Well Done! Email verified Successfully</h4>

                                    <div class="d-grid">
                                        <a href="index.html" class="btn btn-primary fw-semibold py-2">Bake to Dashboard</a>
                                    </div>
                                </form>
                            </div>

                            <p class="text-muted text-center mt-4 mb-0">
                                Return to
                                <a href="auth-split-sign-in.html" class="text-decoration-underline link-offset-3 fw-semibold">Sign in</a>
                            </p>

                            <p class="text-center text-muted mt-auto mb-0">
                                ©
                                <script>
                                    document.write(new Date().getFullYear())
                                </script>
                                __name__ — by
                                <span class="fw-bold">__author__</span>
                            </p>
                        </div>
                    </div>
                    <!-- End Auth Box Content -->
                </div>
                <div class="col">
                    <div class="h-100 position-relative card-side-img rounded-0 overflow-hidden" style="background-image: url(assets/images/auth.jpg)">
                        <div class="p-4 card-img-overlay auth-overlay d-flex align-items-end justify-content-center"></div>
                    </div>
                </div>
            </div>
        </div>

        @@include('./partials/footer-scripts.html')
    </body>
</html>
